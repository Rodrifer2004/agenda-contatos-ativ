<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Contatos</title>

    <link rel="stylesheet" href="css/style.css">

    <script type="module" src="js/app.js"></script>
</head>

<body>

    <div class="container">

        <h1>Agenda de Contatos</h1>

        <div class="busca">
            <input type="text" id="buscaNome" placeholder="Pesquisar nome">
            <button id="btnBuscar">Buscar</button>
            <button id="btnNovo">Novo</button>
        </div>

        <form id="contatoForm">

            <input type="hidden" id="contatoId">

            <input
                type="text"
                id="nome"
                placeholder="Nome"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="E-mail"
                required
            >

            <input
                type="text"
                id="telefone"
                placeholder="Telefone"
                required
            >

            <div class="botoes">
                <button type="submit">
                    Salvar
                </button>

                <button
                    type="button"
                    id="btnCancelar">
                    Cancelar
                </button>
            </div>

        </form>

        <table>

            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="listaContatos">

            </tbody>

        </table>

    </div>

</body>
</html>
